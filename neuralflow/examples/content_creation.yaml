name: Content Creation Pipeline
description: 自动创作内容并发布的工作流
version: 1.0

agents:
  - id: researcher
    type: search
    name: Researcher Agent
    description: 搜索和研究信息
    config:
      model: gpt-4
      search_engine: searxng

  - id: writer
    type: writing
    name: Writer Agent
    description: 撰写文章
    config:
      model: gpt-4
      style: professional

  - id: editor
    type: review
    name: Editor Agent
    description: 审核和编辑
    config:
      model: gpt-4
      focus:
        - grammar
        - clarity
        - accuracy

  - id: publisher
    type: publish
    name: Publisher Agent
    description: 发布到平台
    config:
      platforms:
        - wordpress
        - medium

task: |
  写一篇关于 AI 发展趋势的文章，发布到博客

steps:
  - name: research
    description: 研究 AI 发展趋势
    agent: researcher
    input: "AI 发展趋势 2026"
    output: research_data

  - name: write
    description: 撰写文章
    agent: writer
    input: research_data
    output: draft

  - name: edit
    description: 审核和编辑
    agent: editor
    input: draft
    output: final

  - name: publish
    description: 发布到博客
    agent: publisher
    input: final
    output: published_result
